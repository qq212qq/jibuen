<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — jibuen</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  /* 晨雾山脉背景 */
  background:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover no-repeat fixed
}

/* 虚化覆盖层 — 增加层次感 */
body::before{
  content:'';position:fixed;inset:0;
  background:rgba(0,0,0,.25);
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
  z-index:0
}

/* ===== 毛玻璃卡片 ===== */
.login-card{
  position:relative;z-index:1;
  width:90%;max-width:400px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.25);
  border-radius:16px;padding:44px 36px 36px;
  box-shadow:0 8px 32px rgba(0,0,0,.15)
}

.login-card h1{
  text-align:center;color:#fff;font-size:26px;font-weight:500;
  letter-spacing:1px;margin-bottom:4px
}

.login-card .sub{
  text-align:center;color:rgba(255,255,255,.6);font-size:13px;
  margin-bottom:36px;letter-spacing:.5px
}

/* ===== 输入框 ===== */
.field{margin-bottom:18px}

.field input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.20);
  border-radius:8px;font-size:14px;color:#fff;outline:none;
  font-family:inherit;transition:all .2s
}

.field input::placeholder{color:rgba(255,255,255,.4)}

.field input:focus{
  border-color:rgba(255,255,255,.45);
  background:rgba(255,255,255,.15)
}

/* ===== 错误提示 ===== */
.error{
  text-align:center;font-size:12px;
  min-height:18px;margin-bottom:4px
}

/* ===== 登录按钮 — 点缀色 ===== */
.btn{
  width:100%;padding:13px;margin-top:4px;
  background:#5b8c85;color:#fff;border:none;
  border-radius:8px;font-size:14px;font-weight:500;
  cursor:pointer;font-family:inherit;letter-spacing:1px;
  transition:all .25s
}

.btn:hover{background:#4a7a73;box-shadow:0 4px 16px rgba(91,140,133,.3)}

/* ===== 底部文字 ===== */
.footer-text{
  text-align:center;margin-top:28px;
  font-size:12px;color:rgba(255,255,255,.45)
}

.footer-text a{
  color:rgba(255,255,255,.75);text-decoration:none;font-weight:400;
  transition:color .2s
}

.footer-text a:hover{color:#fff}

/* ===== 响应式 ===== */
@media(max-width:480px){
  .login-card{padding:36px 28px}
  .login-card h1{font-size:22px}
}
</style>
</head>
<body>

<div class="login-card">
  <h1>登录</h1>
  <p class="sub">欢迎回到 jibuen</p>

  <form onsubmit="return handleLogin(event)">
    <div class="field">
      <input type="text" id="username" placeholder="用户名或邮箱" autocomplete="username" required>
    </div>
    <div class="field">
      <input type="password" id="password" placeholder="密码" autocomplete="current-password" required>
    </div>
    <div class="error" id="errorMsg"></div>
    <button type="submit" class="btn">登 录</button>
  </form>

  <p class="footer-text">
    还没有账号？<a href="#">立即注册</a>
    &nbsp;·&nbsp;
    <a href="index.html">返回首页</a>
    &nbsp;·&nbsp;
    <a href="notes.html">📝 代码笔记</a>
  </p>
</div>

<script>
function handleLogin(e){
  e.preventDefault();
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('password').value.trim();
  var m=document.getElementById('errorMsg');
  if(!u||!p){m.textContent='请填写所有字段';return false;}
  if(u==='admin'&&p==='123456'){
    m.style.color='#a3d5cf';
    m.textContent='登录成功，正在跳转...';
    setTimeout(function(){window.location.href='index.html';},1000);
  }else{
    m.style.color='#f4a3a3';
    m.textContent='用户名或密码错误';
  }
  return false;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时聊天 — jibuen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  font-weight:400;font-size:14px;line-height:1.5;
  background:#0A0A0B;color:#e0e0e0;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;height:100vh
}

/* ===== 整体布局 ===== */
.chat-app{display:flex;height:100vh;width:100%}

/* ===== 左侧联系人列表 ===== */
.sidebar{
  width:320px;min-width:320px;height:100%;
  background:#121212;border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;flex-shrink:0
}
@media(max-width:768px){
  .sidebar{width:100%;min-width:100%}
  .chat-main{display:none!important}
  .chat-app.chat-open .sidebar{display:none}
  .chat-app.chat-open .chat-main{display:flex!important}
}

/* 侧栏顶部 */
.sidebar-header{
  padding:16px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)
}
.sidebar-header h2{font-size:18px;font-weight:600;color:#fff}
.sidebar-header-actions{display:flex;gap:8px}
.sidebar-header-actions button{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.06);color:#999;cursor:pointer;
  font-size:16px;transition:all .15s;display:flex;align-items:center;justify-content:center
}
.sidebar-header-actions button:hover{background:rgba(255,255,255,.12);color:#fff}

/* 搜索栏 */
.sidebar-search{padding:12px 16px}
.sidebar-search input{
  width:100%;padding:10px 16px;border-radius:20px;border:none;
  background:#1e1e1e;color:#fff;font-size:13px;font-family:inherit;
  outline:none;transition:background .2s
}
.sidebar-search input::placeholder{color:#666}
.sidebar-search input:focus{background:#252525}

/* 联系人列表 */
.contact-list{flex:1;overflow-y:auto}
.contact-list::-webkit-scrollbar{width:4px}
.contact-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

.contact-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;cursor:pointer;transition:background .15s;
  position:relative
}
.contact-item:hover{background:rgba(255,255,255,.03)}
.contact-item.active{background:rgba(255,255,255,.06)}
.contact-avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:600;color:#fff;position:relative
}
.contact-avatar .dot{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  border:2px solid #121212
}
.contact-avatar .dot.online{background:#28DF7D}
.contact-avatar .dot.offline{background:#666}

.contact-info{flex:1;min-width:0}
.contact-name{font-size:14px;font-weight:500;color:#e0e0e0;margin-bottom:3px}
.contact-preview{font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-meta{text-align:right;flex-shrink:0}
.contact-time{font-size:11px;color:#555;margin-bottom:3px}
.contact-badge{
  display:inline-block;background:#e8702a;color:#fff;
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;
  min-width:18px;text-align:center
}

/* ===== 右侧聊天区 ===== */
.chat-main{
  flex:1;height:100%;display:flex;flex-direction:column;
  background:#0A0A0B
}

/* 聊天头部 */
.chat-header{
  padding:14px 24px;display:flex;align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06);background:#121212
}
.chat-header-left{display:flex;align-items:center;gap:12px}
.chat-header-avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:600;color:#fff
}
.chat-header-name{font-size:15px;font-weight:600;color:#fff}
.chat-header-status{font-size:11px;color:#666}
.chat-header-actions{display:flex;gap:4px}
.chat-header-actions button{
  width:34px;height:34px;border-radius:50%;border:none;
  background:transparent;color:#999;cursor:pointer;
  font-size:16px;transition:all .15s;display:flex;align-items:center;justify-content:center
}
.chat-header-actions button:hover{background:rgba(255,255,255,.06);color:#fff}

/* 消息区 */
.chat-messages{
  flex:1;overflow-y:auto;padding:20px 24px;
  display:flex;flex-direction:column;gap:4px
}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

.msg-time-divider{
  text-align:center;padding:16px 0 8px
}
.msg-time-divider span{
  font-size:11px;color:#444;background:#0A0A0B;padding:0 12px
}

.msg-row{display:flex;gap:8px;max-width:70%;margin-bottom:2px}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-row:not(.mine){align-self:flex-start}
.msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:#fff;align-self:flex-end
}
.msg-bubble{
  padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;
  word-break:break-word;position:relative
}
.msg-row:not(.mine) .msg-bubble{
  background:#1e1e1e;color:#e0e0e0;
  border-bottom-left-radius:4px
}
.msg-row.mine .msg-bubble{
  background:#e8702a;color:#fff;
  border-bottom-right-radius:4px
}
.msg-row.mine .msg-avatar{display:none}

/* 输入区 */
.chat-input-area{
  padding:12px 24px 16px;background:#121212;
  border-top:1px solid rgba(255,255,255,.06)
}
.chat-input-row{display:flex;align-items:flex-end;gap:10px}
.chat-input-row textarea{
  flex:1;padding:10px 16px;border-radius:20px;border:none;
  background:#1e1e1e;color:#fff;font-size:14px;font-family:inherit;
  outline:none;resize:none;min-height:42px;max-height:120px;
  line-height:1.4;transition:background .2s
}
.chat-input-row textarea::placeholder{color:#555}
.chat-input-row textarea:focus{background:#252525}
.chat-input-row .btn-send{
  width:42px;height:42px;border-radius:50%;border:none;
  background:#e8702a;color:#fff;cursor:pointer;
  font-size:18px;transition:all .15s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.chat-input-row .btn-send:hover{background:#d2611f;transform:scale(1.05)}
.chat-input-row .btn-send:active{transform:scale(.95)}

/* 空状态 */
.chat-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:#444
}
.chat-empty-icon{font-size:64px;opacity:.3}
.chat-empty-text{font-size:15px}
.chat-empty-sub{font-size:12px;color:#333}

/* 移动端返回按钮 */
.btn-back{
  display:none;width:34px;height:34px;border-radius:50%;border:none;
  background:transparent;color:#999;cursor:pointer;font-size:18px;
  align-items:center;justify-content:center
}
@media(max-width:768px){.btn-back{display:flex}}
</style>
</head>
<body>

<div class="chat-app" id="chatApp">

<!-- 左侧联系人 -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h2>消息</h2>
    <div class="sidebar-header-actions">
      <button title="新建聊天">+</button>
      <button title="搜索" style="font-size:14px">🔍</button>
    </div>
  </div>

  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="搜索联系人…" oninput="filterContacts()">
  </div>

  <div class="contact-list" id="contactList"></div>
</aside>

<!-- 右侧聊天 -->
<main class="chat-main" id="chatMain">
  <div class="chat-empty" id="chatEmpty">
    <div class="chat-empty-icon">💬</div>
    <div class="chat-empty-text">选择一个联系人开始聊天</div>
    <div class="chat-empty-sub">实时通讯 · 端到端加密</div>
  </div>
</main>

</div>

<script>
// ===== 数据 =====
var contacts = [
  { id:1, name:'李思远', color:'#4A90D9', online:true,  lastMsg:'那个项目的API文档发我一下', time:'14:22', unread:2 },
  { id:2, name:'陈小雨', color:'#E8702A', online:true,  lastMsg:'周末有空吗？一起去看展', time:'13:45', unread:0 },
  { id:3, name:'张工',   color:'#6C5CE7', online:false, lastMsg:'已部署到生产环境', time:'昨天', unread:0 },
  { id:4, name:'项目讨论组', color:'#28DF7D', online:true,  lastMsg:'小林：收到，我晚上改好', time:'昨天', unread:5 },
  { id:5, name:'王姐HR', color:'#F5A623', online:false, lastMsg:'面试安排在明天下午三点', time:'周一', unread:0 },
  { id:6, name:'技术分享群', color:'#E74C3C', online:true,  lastMsg:'赵明：这个方案我倾向第二种', time:'周一', unread:12 },
  { id:7, name:'刘浩然', color:'#1ABC9C', online:true,  lastMsg:'OK，我这边搞定了', time:'周日', unread:0 },
  { id:8, name:'前端摸鱼小队', color:'#9B59B6', online:true,  lastMsg:'哈哈哈你看看这个bug', time:'周六', unread:3 }
];

// 聊天记录（模拟）
var messages = {
  1: [
    { from:'李思远', text:'昨天的需求评审你觉得怎么样？', time:'14:10' },
    { from:'me', text:'有几个实现细节需要再确认一下', time:'14:12' },
    { from:'李思远', text:'嗯，我也觉得数据库那块要重新设计', time:'14:15' },
    { from:'李思远', text:'那个项目的API文档发我一下', time:'14:22' }
  ],
  2: [
    { from:'陈小雨', text:'最近忙什么呢', time:'13:30' },
    { from:'me', text:'在搞一个新项目的前端框架', time:'13:35' },
    { from:'陈小雨', text:'听起来不错！周末有空吗？一起去看展', time:'13:45' }
  ],
  3: [
    { from:'张工', text:'部署脚本已经写好了', time:'10:00' },
    { from:'me', text:'好的，我先在测试环境跑一下', time:'10:15' },
    { from:'张工', text:'已部署到生产环境', time:'11:30' }
  ],
  4: [
    { from:'小林', text:'有人用过这个新框架吗', time:'15:00' },
    { from:'赵哥', text:'文档很全，上手不难', time:'15:05' },
    { from:'小林', text:'收到，我晚上改好', time:'15:10' }
  ],
  5: [
    { from:'王姐HR', text:'你好，我们收到了你的简历', time:'09:00' },
    { from:'me', text:'你好，请问面试流程是怎样的', time:'09:30' },
    { from:'王姐HR', text:'面试安排在明天下午三点', time:'10:00' }
  ]
};

var activeContact = null;

// ===== 渲染联系人列表 =====
function renderContacts(filter){
  var list = document.getElementById('contactList');
  var filtered = filter ? contacts.filter(function(c){
    return c.name.toLowerCase().includes(filter.toLowerCase());
  }) : contacts;

  list.innerHTML = filtered.map(function(c){
    var initials = c.name.slice(0,2);
    var time = c.time;
    var badge = c.unread > 0 ? '<div class="contact-badge">'+(c.unread>99?'99+':c.unread)+'</div>' : '';
    return '<div class="contact-item'+(activeContact&&activeContact.id===c.id?' active':'')+
      '" onclick="openChat('+c.id+')" data-id="'+c.id+'">'+
      '<div class="contact-avatar" style="background:'+c.color+'">'+initials+
        '<div class="dot '+(c.online?'online':'offline')+'"></div></div>'+
      '<div class="contact-info"><div class="contact-name">'+c.name+'</div>'+
        '<div class="contact-preview">'+c.lastMsg+'</div></div>'+
      '<div class="contact-meta"><div class="contact-time">'+time+'</div>'+badge+'</div>'+
    '</div>';
  }).join('');
}

function filterContacts(){
  var q = document.getElementById('searchInput').value;
  renderContacts(q);
}

// ===== 打开聊天 =====
function openChat(id){
  var c = contacts.find(function(x){return x.id===id});
  if(!c) return;
  activeContact = c;
  // 清除未读
  c.unread = 0;
  renderContacts();

  var chatMain = document.getElementById('chatMain');
  var msgs = messages[id] || [];
  var initials = c.name.slice(0,2);

  chatMain.innerHTML =
    '<div class="chat-header">'+
      '<div class="chat-header-left">'+
        '<div class="btn-back" onclick="closeChat()">←</div>'+
        '<div class="chat-header-avatar" style="background:'+c.color+'">'+initials+'</div>'+
        '<div><div class="chat-header-name">'+c.name+'</div>'+
          '<div class="chat-header-status">'+(c.online?'在线':'离线')+'</div></div>'+
      '</div>'+
      '<div class="chat-header-actions">'+
        '<button title="语音通话">📞</button>'+
        '<button title="视频通话">📹</button>'+
        '<button title="更多">⋯</button>'+
      '</div>'+
    '</div>'+
    '<div class="chat-messages" id="msgArea">'+
      '<div class="msg-time-divider"><span>开始聊天</span></div>'+
      msgs.map(function(m){ return renderMsg(m); }).join('')+
    '</div>'+
    '<div class="chat-input-area">'+
      '<div class="chat-input-row">'+
        '<textarea id="msgInput" placeholder="输入消息…" rows="1" onkeydown="onMsgKey(event)"></textarea>'+
        '<button class="btn-send" onclick="sendMsg()">↑</button>'+
      '</div>'+
    '</div>';

  chatMain.classList.remove('chat-empty');
  document.getElementById('chatApp').classList.add('chat-open');
  scrollBottom();
  setTimeout(function(){
    var inp = document.getElementById('msgInput');
    if(inp) inp.focus();
  },100);
}

function closeChat(){
  activeContact = null;
  document.getElementById('chatApp').classList.remove('chat-open');
  renderContacts();
}

// ===== 消息渲染 =====
function renderMsg(m){
  var isMine = m.from === 'me';
  return '<div class="msg-row'+(isMine?' mine':'')+'">'+
    (isMine ? '' : '<div class="msg-avatar" style="background:#666">'+m.from.slice(0,2)+'</div>')+
    '<div class="msg-bubble">'+m.text+'</div>'+
    '</div>';
}

function scrollBottom(){
  setTimeout(function(){
    var area = document.getElementById('msgArea');
    if(area){ area.scrollTop = area.scrollHeight; }
  },50);
}

// ===== 发送消息 =====
function sendMsg(){
  var inp = document.getElementById('msgInput');
  if(!inp) return;
  var text = inp.value.trim();
  if(!text) return;

  if(!messages[activeContact.id]) messages[activeContact.id] = [];
  messages[activeContact.id].push({ from:'me', text:text, time:getTime() });

  // 更新联系人预览
  activeContact.lastMsg = '我：'+text;
  activeContact.time = getTime();

  // 重新渲染
  openChat(activeContact.id);

  // 模拟对方回复
  var self = this;
  setTimeout(function(){
    var replies = [
      '好的，收到 👍', '了解了', '稍等我看一下',
      '有道理，我再想想', '哈哈哈是的', '嗯嗯没问题',
      '这个要具体看看代码', '明天碰一下？'
    ];
    var reply = replies[Math.floor(Math.random()*replies.length)];
    messages[activeContact.id].push({ from:activeContact.name, text:reply, time:getTime() });
    activeContact.lastMsg = reply;
    activeContact.time = getTime();
    openChat(activeContact.id);
  }, 800 + Math.random()*1200);
}

function onMsgKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
}

function getTime(){
  var d = new Date();
  return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
}

// ===== 初始化 =====
renderContacts();
</script>

</body>
</html>
